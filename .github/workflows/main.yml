name: nodejs
on: push

jobs:
   build-test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v7
        
      - name: nodejs
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          
      - name: build
        run: npm install
        
      - name: test
        run: npm test
        
      - name: artifact
        uses: actions/upload-artifact@v7
        with:
           name: artifact-1
           path:  | 
                package*
    
      - name: deploy
        run: echo " heloo guru"
