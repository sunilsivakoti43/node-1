name: nodejs
on: push 

permissions: 
  security-events: write
  issues:   write
  actions: read
  contents: read 
  
jobs:
   build-test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v7
        
      - name: nodejs
        uses: actions/setup-node@v6
        with:
          node-version: '24' 
          
      - name: initialize codeql
        uses: github/codeql-action/init@v4
        with:
           language: javascript   

      - name: autobuild
        uses: github/codeql-action/autobuild@v3

      - name: run codeql analysis
        uses: github/codeql-action/analyze@v4
          
      - name: build
        run: npm install
        
      - name: test
        run: npm test
        
      - name: artifact
        uses: actions/upload-artifact@v7
        with:
           name: artifact-1
           path:  | 
                package*
    
      - name: deploy
        run: echo " heloo guru"
